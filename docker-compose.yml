version: '3.8'

services:
  freqtrade:
    image: freqtrade/freqtrade:stable
    container_name: grid-trading-bot
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.json:/freqtrade/config.json
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
    command: start